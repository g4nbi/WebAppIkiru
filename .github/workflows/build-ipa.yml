name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Xcode 15 tersedia di macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      # -------------------------------------------------------
      # OPSI A: Build tanpa signing (untuk testing / sideload)
      # -------------------------------------------------------
      - name: Build (no signing)
        run: |
          xcodebuild \
            -project IkiruApp.xcodeproj \
            -scheme IkiruApp \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath $RUNNER_TEMP/IkiruApp.xcarchive \
            archive

      - name: Export IPA (no signing)
        run: |
          mkdir -p $RUNNER_TEMP/ipa-output
          # Buat ExportOptions.plist untuk export tanpa signing
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          # Pack .xcarchive menjadi .ipa manual
          cd $RUNNER_TEMP/IkiruApp.xcarchive/Products/Applications
          mkdir -p $RUNNER_TEMP/ipa-output/Payload
          cp -r IkiruApp.app $RUNNER_TEMP/ipa-output/Payload/
          cd $RUNNER_TEMP/ipa-output
          zip -r IkiruApp_nosign.ipa Payload
          echo "IPA created at: $RUNNER_TEMP/ipa-output/IkiruApp_nosign.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IkiruApp-IPA
          path: ${{ runner.temp }}/ipa-output/IkiruApp_nosign.ipa
          retention-days: 30

